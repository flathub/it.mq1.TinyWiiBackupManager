id: it.mq1.TinyWiiBackupManager
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm22
command: TinyWiiBackupManager
finish-args:
  - --share=network
  - --share=ipc
  - --filesystem=host
  - --device=dri
  - --socket=fallback-x11
  - --socket=wayland
  - --env=TWBM_DISABLE_UPDATES=1
modules:
  - name: TinyWiiBackupManager
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm22/bin
      env:
        CARGO_HOME: /run/build/TinyWiiBackupManager/cargo
        CARGO_NET_OFFLINE: "true"
        CC: clang
        AR: llvm-ar
        CFLAGS: -O3 -flto
        RUSTFLAGS: -C linker-plugin-lto -C link-arg=-fuse-ld=lld
        CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: clang
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml
      - cargo --offline build --release
      - install -Dm0755 target/release/twbm-gui ${FLATPAK_DEST}/bin/TinyWiiBackupManager
      - install -Dm0644 package/linux/AppDir/usr/share/icons/hicolor/16x16/apps/it.mq1.TinyWiiBackupManager.png ${FLATPAK_DEST}/share/icons/hicolor/16x16/apps/it.mq1.TinyWiiBackupManager.png
      - install -Dm0644 package/linux/AppDir/usr/share/icons/hicolor/32x32/apps/it.mq1.TinyWiiBackupManager.png ${FLATPAK_DEST}/share/icons/hicolor/32x32/apps/it.mq1.TinyWiiBackupManager.png
      - install -Dm0644 package/linux/AppDir/usr/share/icons/hicolor/48x48/apps/it.mq1.TinyWiiBackupManager.png ${FLATPAK_DEST}/share/icons/hicolor/48x48/apps/it.mq1.TinyWiiBackupManager.png
      - install -Dm0644 package/linux/AppDir/usr/share/icons/hicolor/64x64/apps/it.mq1.TinyWiiBackupManager.png ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps/it.mq1.TinyWiiBackupManager.png
      - install -Dm0644 package/linux/AppDir/usr/share/icons/hicolor/128x128/apps/it.mq1.TinyWiiBackupManager.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/it.mq1.TinyWiiBackupManager.png
      - install -Dm0644 package/linux/AppDir/usr/share/icons/hicolor/256x256/apps/it.mq1.TinyWiiBackupManager.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/it.mq1.TinyWiiBackupManager.png
      - install -Dm0644 package/linux/AppDir/usr/share/icons/hicolor/512x512/apps/it.mq1.TinyWiiBackupManager.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/it.mq1.TinyWiiBackupManager.png
      - install -Dm0644 package/linux/AppDir/usr/share/applications/it.mq1.TinyWiiBackupManager.desktop ${FLATPAK_DEST}/share/applications/it.mq1.TinyWiiBackupManager.desktop
      - install -Dm0644 package/linux/it.mq1.TinyWiiBackupManager.metainfo.xml ${FLATPAK_DEST}/share/metainfo/it.mq1.TinyWiiBackupManager.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/mq1/TinyWiiBackupManager/archive/refs/tags/v6.0.0.tar.gz
        sha256: 70692f0aeca2071d85ee244a2d8e163b4c8aa1cba9c4fb9af114b7f84e2eb150
      - cargo-sources.json
